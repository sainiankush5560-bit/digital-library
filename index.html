<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Library Management | Ram Kisun College</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            margin: 0; 
            color: var(--text-main); 
        }

        /* Login Overlay */
        #loginContainer { position: fixed; width: 100%; height: 100%; background: var(--primary-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; border: 1px solid #334155; }
        .login-card input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }

        /* Main Content */
        #mainContent { display: none; padding: 30px; max-width: 1200px; margin: auto; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }

        /* Dashboard Stats */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-box h4 { margin: 0; color: #94a3b8; font-size: 14px; }
        .stat-box p { font-size: 28px; font-weight: bold; margin: 10px 0 0 0; }

        /* Controls */
        .control-panel { background: var(--card-bg); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #334155; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        
        button { background: var(--accent); color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Table */
        .table-container { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1e293b; padding: 15px; font-size: 13px; text-transform: uppercase; color: var(--gold); border-bottom: 2px solid #334155; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; vertical-align: middle; }
        
        .thumb-img { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #475569; background: #0f172a; }
        
        /* PDF Link Styling */
        .pdf-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .pdf-link:hover { text-decoration: underline; }

        .btn-delete { background: var(--danger); color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }

        .explore-link { text-align: center; margin-top: 50px; padding-bottom: 50px; }
        .explore-btn { background: var(--gold); color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block; transition: 0.3s; }
        .explore-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4); }
    </style>
</head>
<body>

    <div id="loginContainer">
        <div class="login-card">
            <h1 style="color: var(--accent); margin-bottom: 10px;">नमस्ते! 👋</h1>
            <p style="color: #94a3b8; margin-bottom: 20px;">Admin पैनल में लॉगिन करें</p>
            <input type="email" id="userEmail" placeholder="Email (any@mail.com)">
            <input type="password" id="userPass" placeholder="Password">
            <button onclick="handleLogin()" style="width: 100%; margin-top: 10px;">Login</button>
        </div>
    </div>

    <div id="mainContent">
        <header>
            <div>
                <h2 style="margin: 0; color: var(--accent);">🏛️ Ram Kisun College</h2>
                <small style="color: #ee5d09;">Digital Library Management System</small>
            </div>
            <div>
                <h2 style="margin: 0; color: var(--accent);">📚 📖 From computer science students</h2>
                <small style="color: #e8ce07;">डिजिटल कदम, सफलता हर दम</small>
            </div>
            <button onclick="location.reload()" style="background: #334155; color: white;">Logout</button>
        </header>

        <div class="stats-container">
            <div class="stat-box"><h4>Total Books</h4><p id="totalCount">1</p></div>
            <div class="stat-box"><h4>Categories</h4><p>4</p></div>
            <div class="stat-box"><h4>Status</h4><p style="color: var(--success); font-size: 18px;">Online</p></div>
        </div>

        <div class="control-panel">
            <input type="text" class="search-bar" id="searchInp" onkeyup="searchBooks()" placeholder="किताब या लेखक का नाम सर्च करें...">
            
            <form id="bookForm">
                <input type="text" id="bookId" placeholder="Book ID (e.g. 101)" required>
                <input type="text" id="bookName" placeholder="Book Name" required>
                <input type="text" id="authorName" placeholder="Author Name" required>
                <select id="block">
                    <option value="Science">Science</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Computer">Computer</option>
                    <option value="English">English</option>
                </select>
                <input type="text" id="imgUrl" placeholder="Image URL (Link पेस्ट करें)">
                <input type="text" id="pdfUrl" placeholder="PDF URL (Link पेस्ट करें)">
                <button type="submit">Add to Records +</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Cover</th>
                        <th>ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                </thead>
                <tbody id="masterTable">
                </tbody>
                    
                       
               
            </table>
        </div>

        <div class="explore-link">
            <a href="vishal.html" class="explore-btn">Browse Full Gallery ➔</a>
        </div>
    </div>

    <script>

    // 1️⃣ Load Saved Data On Page Start
    window.onload = function() {
        const savedData = localStorage.getItem("libraryData");
        if (savedData) {
            document.getElementById("masterTable").innerHTML = savedData;
        }
        updateCount();
    };

    // 2️⃣ Login Logic
    function handleLogin() {
        const email = document.getElementById('userEmail').value;
        if(email.includes('@')) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else { 
            alert("कृपया सही Email डालें!"); 
        }
    }

    // 3️⃣ Save Data Function
    function saveData() {
        localStorage.setItem("libraryData", 
        document.getElementById("masterTable").innerHTML);
    }

    // 4️⃣ Add Book Logic
    const form = document.getElementById("bookForm");
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const id = document.getElementById("bookId").value;
        const name = document.getElementById("bookName").value;
        const author = document.getElementById("authorName").value;
        const block = document.getElementById("block").value;
        const img = document.getElementById("imgUrl").value.trim() || 'https://via.placeholder.com/45x60?text=No+Cover';
        const pdf = document.getElementById("pdfUrl").value.trim() || '#';

        const table = document.getElementById("masterTable");

        const rowHTML = `
            <tr>
                <td>
                    <a href="${img}" target="_blank">
                        <img src="${img}" class="thumb-img" 
                        onerror="this.src='https://via.placeholder.com/45x60?text=Error'">
                    </a>
                </td>
                <td>${id}</td>
                <td>${name}</td>
                <td>${author}</td>
                <td>${block}</td>
                <td>
                    <a href="${pdf}" target="_blank" class="pdf-link">📄 View PDF</a>
                    <button class="btn-delete" onclick="deleteRow(this)">Del</button>
                </td>
            </tr>
        `;

        table.insertAdjacentHTML('beforeend', rowHTML);

        saveData();
        updateCount();
        form.reset();

        alert("किताब सफलतापूर्वक जोड़ दी गई!");
    });

    // 5️⃣ Delete Logic
    function deleteRow(btn) {
        if(confirm("क्या आप इसे डिलीट करना चाहते हैं?")) {
            btn.closest('tr').remove();
            saveData();
            updateCount();
        }
    }

    // 6️⃣ Search Logic
    function searchBooks() {
        let filter = document.getElementById('searchInp').value.toUpperCase();
        let rows = document.getElementById('masterTable').getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText || rows[i].textContent;
            rows[i].style.display = text.toUpperCase().includes(filter) ? "" : "none";
        }
    }

    // 7️⃣ Update Counter
    function updateCount() {
        const count = document.getElementById('masterTable').rows.length;
        document.getElementById('totalCount').innerText = count;
    }

</script>
</body>
</html>
